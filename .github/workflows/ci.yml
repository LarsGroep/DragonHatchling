name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (core + live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages/core (M0 runtime, no ML extras) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/core[dev]"

      - name: Test packages/core
        run: pytest packages/core -q

      - name: Install apps/live deps
        run: pip install -r apps/live/requirements-dev.txt

      - name: Test apps/live
        working-directory: apps/live
        run: pytest -q

  web:
    name: web (schema tsc + web tsc + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Typecheck packages/schema (fixture round-trip)
        working-directory: packages/schema
        run: |
          npm ci
          npm run typecheck

      - name: Install apps/web
        working-directory: apps/web
        run: npm ci

      - name: Typecheck apps/web
        working-directory: apps/web
        run: npm run typecheck

      - name: Lint apps/web
        working-directory: apps/web
        run: npm run lint

      - name: Build apps/web
        working-directory: apps/web
        run: npm run build

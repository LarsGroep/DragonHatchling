[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "vitreous"
version = "0.1.0"
description = "ViTreous core: instrumentation, XAI, Gaussian fields, graph, concepts, and Explanation Pack tooling for explainable Vision Transformers"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.6",
    "numpy>=1.24",
    "jsonschema>=4.21",
]

[project.optional-dependencies]
# Heavy ML stack — NOT required to import the package or run M0 tests.
ml = [
    "torch>=2.1",
    "torchvision>=0.16",
    "timm>=1.0",
    "pillow>=10.0",
]
dev = [
    "pytest>=8",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["vitreous*"]

[tool.setuptools.package-data]
# Ship the JSON Schema alongside the package is not needed: schema lives in
# packages/schema and is resolved relatively. No package data at M0.

[tool.pytest.ini_options]
testpaths = ["tests"]
